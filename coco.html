<html>
    <head>

    </head>
    <body>
        <main>
            <section style="padding: 30%;">
            <div style="background-image: linear-gradient(purple,blue); ">
                <p style="
  background: -webkit-linear-gradient(yellow,rgb(255, 145, 0));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
    font-size: 50px; padding: 25vw; ">
                pinho
                </p>
            </div>
            <button class="btn">botao</button>
            <button class="fugir">nada</button>

            <div class="amama">amogus</div>
            </section>
        </main>
    </body>
    <style>

@keyframes myAnimation {
  from {
    background-color: red;
    height: 100px;
}
  to {
    background-color: yellow;
    height: 25px;}
}


@keyframes arcoiris {
  0%   {background-color: red;}
  12%   {background-color: orange;}
  25%  {background-color: yellow;}
  37%   {background-color: lime;}
  50%   {background-color: cyan;}
  62%  {background-color: blue;}
  75%   {background-color: purple;}
  87%   {background-color:deeppink;}
  100%   {background-color:red;}
}
@keyframes tamanhos {
  0%   {height: 1px; width: 5px;}
  12%   {height: 12px; width: 2px;}
  25%  {height: 120px; width: 50px;}
  37%   {height: 60px; width: 55px;}
  50%   {height: 22px; width: 76px;}
  62%  {height: 54px; width: 25px;}
  75%   {height: 100px; width: 500px;}
  87%   {height: 10px; width: 500px;}
  100%   {height: 1px; width: 5px;}
}
        .btn{
            background-color: cyan;
            padding: 10px;
            border-width:  5px;
            border-color: blue;
            border-radius: 10px;

        }
        .btn:hover{
            background-color: rgb(110, 255, 255);
        }
        .btn:active{
            background-color: aquamarine;
            animation-name: arcoiris;
            animation-duration: 2s;
            animation-iteration-count: infinite;
        }

        .amama{
            padding: 10px;
            background-color: blueviolet;
            animation-name: tamanhos;
            animation-duration: 2s;
            animation-iteration-count: infinite;
        }
        .fugir{
            position: relative;
            background-color: aqua;
        }
        
        .fugir:hover{
   top: random(0%, 100%);
   left: random(0%, 100%);
        }
    </style>
</html>
